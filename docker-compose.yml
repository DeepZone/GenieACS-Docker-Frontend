services:
  udpst-server:
    build:
      context: .
      dockerfile: docker/obudpst/Dockerfile
    container_name: udpst-server
    ports:
      - "25000:25000/udp"
    restart: unless-stopped

  genieacs-frontend:
    build: .
    container_name: genieacs-frontend
    depends_on:
      - udpst-server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=please-change-me
      - DATABASE_URL=sqlite:////data/app.db
      - UDPST_SERVER_HOST=0.0.0.0
      - UDPST_SERVER_PORT=25000
      - UDPST_TEST_HOST=YOUR_PUBLIC_IP_OR_DNS
      - UDPST_TEST_PORT=25000
      - UDPST_TEST_ROLE=Receiver
    restart: unless-stopped
