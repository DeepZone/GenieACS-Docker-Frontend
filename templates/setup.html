{% extends 'base.html' %}
{% block title %}Initiales Setup{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Initiales Setup</h1>
        <p class="text-muted">Es existiert noch kein Benutzer. Bitte lege den ersten Admin-Zugang an.</p>
        <form method="post" class="vstack gap-3">
          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">Vorname</label>
              <input name="first_name" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Nachname</label>
              <input name="last_name" class="form-control" />
            </div>
          </div>
          <div>
            <label class="form-label">Admin-Benutzername</label>
            <input name="username" class="form-control" required />
          </div>
          <div>
            <label class="form-label">Admin-Passwort</label>
            <input name="password" type="password" class="form-control" required />
          </div>
          <div>
            <label class="form-label">ACS-API-URL</label>
            <input name="acs_api_url" class="form-control" value="http://genieacs:7557" required />
          </div>
          <button class="btn btn-primary" type="submit">Admin anlegen</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
